name: Sync Blog Posts

on:
  push:
    branches:
      - main
    paths:
      - "*.md"
      - "!*.en.md"
      - "pages/*.md"
      - "!pages/*.en.md"
      - ".blog-syncignore"
      - "scripts/sync-posts-to-blog.sh"
      - "scripts/translate.py"
      - "scripts/requirements.txt"
      - ".github/workflows/sync-posts-to-blog.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-blog-posts
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install translator dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Compute changed Markdown files
        id: changed
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          ZERO="0000000000000000000000000000000000000000"
          if [[ "$EVENT_NAME" != "push" ]] || [[ -z "${BEFORE_SHA:-}" ]] || [[ "$BEFORE_SHA" == "$ZERO" ]]; then
            echo "Not a regular push (or first push to branch); will translate all files."
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Only consider added/modified .md files at repo root or in pages/.
          # Translation outputs (*.en.md) are excluded — the script ignores
          # them anyway, but no need to scan.
          FILES=$(git diff --name-only --diff-filter=AM "$BEFORE_SHA" "$AFTER_SHA" -- '*.md' 'pages/*.md' \
            | grep -v '\.en\.md$' || true)
          echo "Changed source files:"
          echo "$FILES"
          # Join with commas for the script.
          JOINED=$(echo "$FILES" | paste -sd, -)
          echo "files=$JOINED" >> "$GITHUB_OUTPUT"

      - name: Translate changed posts
        env:
          OPENAI_API_KEY: ${{ secrets.BLOG_TRANSLATOR }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
          TRANSLATE_FAILURES_FILE: ${{ runner.temp }}/translation-failures.txt
        run: |
          python scripts/translate.py --verbose --changed-only "$CHANGED_FILES"

      - name: Commit and push translations to source repo
        if: always() && (success() || failure())
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No translation changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Sync translations [bot]"
          git push origin HEAD:main

      - name: Checkout blog repo
        if: always() && (success() || failure())
        uses: actions/checkout@v4
        with:
          repository: diffw/diffw.github.io
          ref: main
          path: blog-repo
          fetch-depth: 0
          token: ${{ secrets.BLOG_REPO_TOKEN }}

      - name: Sync root markdown files into content/posts
        if: always() && (success() || failure())
        run: |
          bash scripts/sync-posts-to-blog.sh \
            "$GITHUB_WORKSPACE" \
            "$GITHUB_WORKSPACE/blog-repo/content/posts" \
            "$GITHUB_WORKSPACE/.blog-syncignore"

      - name: Sync pages into content root
        if: always() && (success() || failure())
        run: |
          bash scripts/sync-posts-to-blog.sh \
            "$GITHUB_WORKSPACE/pages" \
            "$GITHUB_WORKSPACE/blog-repo/content"

      - name: Commit and push blog changes
        if: always() && (success() || failure())
        working-directory: blog-repo
        env:
          SOURCE_SHA: ${{ github.sha }}
        run: |
          if [[ -z "$(git status --porcelain -- content)" ]]; then
            echo "No content changes to sync."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content
          git commit -m "Sync content from diff-blog-source@${SOURCE_SHA::7}"
          git push origin main

      - name: Surface translation failures
        if: always()
        env:
          TRANSLATE_FAILURES_FILE: ${{ runner.temp }}/translation-failures.txt
        run: |
          if [[ -s "$TRANSLATE_FAILURES_FILE" ]]; then
            echo "::error title=Translation failures::Some posts failed to translate; see file list below"
            echo "Failed source files:"
            cat "$TRANSLATE_FAILURES_FILE"
            exit 1
          fi
          echo "All translations succeeded."
